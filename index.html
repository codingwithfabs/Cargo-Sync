<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CargoSync</title>

    <!-- Img's -->
    <link rel="icon" type="image/png" href="./Assets/CargoSyncLogo.png">
    <!--  -->

    <!-- Css -->
    <link rel="stylesheet" href="index.css">
    <!--  -->

</head>
<body>
    <div class="login-container">
        <!-- Left side - Image -->
        <div class="image-section">
            <img src="./Assets/CargoSyncLogo.png" alt="CargoSync" class="logo">
            <h1>CargoSync</h1>
            <p>Simplifying logistics management</p>
        </div>

        <!-- Right side - Login Form -->
        <div class="form-section">
            <div class="form-wrapper">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your account</p>

                <form action="" id="input-form">
                    <div class="form-group">
                        <label for="email-input">Email Address</label>
                        <input type="email" id="email-input" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password-input">Password</label>
                        <input type="password" id="password-input" placeholder="********" required>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember">
                            <input type="checkbox" id="remember-input">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" id="submit-btn" class="login-btn">Sign In</button>
                </form>

                <p class="signup-text">Don't have an account? <a href="signup_page.html" class="signup-link">Sign up</a></p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
