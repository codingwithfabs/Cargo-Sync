<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CargoSync</title>

    <!-- Img's -->
    <link rel="icon" type="image/png" href="./Assets/CargoSyncLogo.png">
    <!--  -->

    <!-- Css -->
    <link rel="stylesheet" href="index.css">
    <!--  -->

</head>
<body>
    <div class="login-container">
        <!-- Left side - Image -->
        <div class="image-section">
            <img src="./Assets/CargoSyncLogo.png" alt="CargoSync" class="logo">
            <h1>CargoSync</h1>
            <p>Simplifying logistics management</p>
        </div>

        <!-- Right side - Signup Form -->
        <div class="form-section">
            <div class="form-wrapper">
                <h2>Create Account</h2>
                <p class="subtitle">Join CargoSync today</p>

                <form action="" id="signup-form">
                    <div class="form-group">
                        <label for="fullname-input">Full Name</label>
                        <input type="text" id="fullname-input" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="signup-email-input">Email Address</label>
                        <input type="email" id="signup-email-input" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="signup-password-input">Password</label>
                        <input type="password" id="signup-password-input" placeholder="********" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password-input">Confirm Password</label>
                        <input type="password" id="confirm-password-input" placeholder="********" required>
                    </div>

                    <div class="form-group">
                        <label for="role-input">Account Type</label>
                        <select id="role-input" required>
                            <option value="">Select account type</option>
                            <option value="trucker">Trucker</option>
                            <option value="client">Client</option>
                        </select>
                    </div>

                    <div class="terms">
                        <label>
                            <input type="checkbox" id="terms-input" required>
                            <span>I agree to the <a href="#" class="terms-link">Terms and Conditions</a></span>
                        </label>
                    </div>

                    <button type="submit" id="signup-btn" class="login-btn">Create Account</button>
                </form>

                <p class="signup-text">Already have an account? <a href="index.html" class="signup-link">Sign in</a></p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
